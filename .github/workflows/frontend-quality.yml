name: Frontend quality

on:
  push:

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  promote-hom:
    name: Promote hom to main
    if: github.ref == 'refs/heads/hom'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    concurrency:
      group: promote-hom-to-main
      cancel-in-progress: false

    steps:
      - name: Create promotion pull request when needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pull_request="$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --head hom --state open --json number --jq 'length')"

          if [ "$existing_pull_request" -gt 0 ]; then
            echo "A promotion pull request from hom to main is already open."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head hom \
            --title "chore: promote hom to main" \
            --body "Automated promotion pull request created after a successful hom validation. Review the homologation deployment before merging."
