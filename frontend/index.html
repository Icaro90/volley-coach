<!doctype html>
<html data-theme="dark" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/volleyball.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aprenda regras de vôlei de forma simples e prática." />
    <title>Volley Coach</title>
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('volley-coach.theme') === 'light' ? 'light' : 'dark'
      } catch {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
